services:
  supply-chain-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9049:9049"
    env_file:
      - .env
    volumes:
      - dashboard-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9049/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  dashboard-data:
